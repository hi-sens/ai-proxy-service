model_list:
  # 本地Ollama模型
  - model_name: local-qwen
    litellm_params:
      model: ollama/qwen2.5:14b
      api_base: http://ollama:11434
      rpm: 60
      timeout: 120

  - model_name: local-llama
    litellm_params:
      model: ollama/llama3.2:latest
      api_base: http://ollama:11434
      rpm: 60
      timeout: 120

  # Claude API（需要配置环境变量）
  - model_name: claude-sonnet
    litellm_params:
      model: claude-3-5-sonnet-20241022
      api_key: ${ANTHROPIC_API_KEY}
      rpm: 1000
      timeout: 120

  # 生产环境配置（带Fallback）
  - model_name: production
    litellm_params:
      model: claude-3-5-sonnet-20241022
      api_key: ${ANTHROPIC_API_KEY}
      fallbacks:
        - model: ollama/qwen2.5:14b
          api_base: http://ollama:11434

# 路由配置
router_settings:
  routing_strategy: least-busy
  num_retries: 3
  timeout: 120
  redis_host: redis
  redis_port: 6379

# 通用设置
litellm_settings:
  drop_params: true
  set_verbose: false
  cache: true
  cache_params:
    type: redis
    host: redis
    port: 6379
    ttl: 3600
